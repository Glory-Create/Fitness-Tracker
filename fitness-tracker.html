function makeWeightSteps(name, sets, weights, tip, muscles) {
  return weights.map((w, i) => ({
    id: `w${w}`,
    name: w === weights[weights.length - 1] ? `${name} — ${w} lbs ⭐` : `${name} — ${w} lbs`,
    reps: sets,
    tip,
    muscles,
    isGoal: i === weights.length - 1,
  }));
}

function getMuscleLevel(muscleId, completed) {
  const keys = muscleMap[muscleId] || [];
  if (!keys.length) return 0;
  const done = keys.filter(k => completed[k]).length;
  const pct = done / keys.length;
  if (pct === 0) return 0;
  if (pct < 0.15) return 1;
  if (pct < 0.35) return 2;
  if (pct < 0.60) return 3;
  if (pct < 0.85) return 4;
  return 5;
}

}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "tracker-v3";

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────
function ExerciseList({ goal, completed, onToggle, onBack }) {
  const done  = goal.exercises.filter(e => completed[`${goal.id}-${e.id}`]).length;
  const total = goal.exercises.length;
  const pct   = Math.round((done / total) * 100);

  return (
    <div>
      <div style={{ padding:"14px 18px 0" }}>
        <button onClick={onBack} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:12, padding:0, marginBottom:14, fontFamily:"Georgia,serif" }}>← Back</button>
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:3 }}>
          <span style={{ fontSize:22 }}>{goal.emoji}</span>
          <h2 style={{ margin:0, fontSize:18, fontWeight:"normal", fontFamily:"Georgia,serif" }}>{goal.name}</h2>
        </div>
        {goal.tip && <div style={{ fontSize:11, color:"#555", fontStyle:"italic", marginBottom:8, lineHeight:1.6 }}>💡 {goal.tip}</div>}
        <div style={{ fontSize:11, color:"#444", marginBottom:13 }}>🎯 {goal.target}</div>
        <div style={{ marginBottom:18 }}>
          <div style={{ background:"#1e2028", borderRadius:4, height:4 }}>
            <div style={{ height:"100%", width:`${pct}%`, background:goal.color, borderRadius:4, transition:"width 0.4s" }}/>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
            <span style={{ fontSize:10, color:"#333" }}>{pct}% complete</span>
            <span style={{ fontSize:10, color:goal.color, fontFamily:"monospace" }}>{done}/{total}</span>
          </div>
        </div>
      </div>
      <div style={{ padding:"0 18px 40px", display:"flex", flexDirection:"column", gap:7 }}>
        {goal.exercises.map((ex, idx) => {
          const key     = `${goal.id}-${ex.id}`;
          const isDone  = !!completed[key];
          const isGoal  = ex.name.includes("⭐");
          const prevDone = idx === 0 || !!completed[`${goal.id}-${goal.exercises[idx-1].id}`];
          const isCurrent = !isDone && prevDone;

          return (
            <button key={ex.id} onClick={() => onToggle(goal.id, ex.id)}
              style={{ background: isDone?"#121a12": isCurrent?"#12121a":"#13141a", border: isDone?`1px solid ${goal.color}22`: isCurrent?"1px solid #5555bb":"1px solid #1e2028", borderLeft: isGoal?`4px solid ${goal.color}`: isDone?`4px solid ${goal.color}55`: isCurrent?"4px solid #5555bb":"4px solid #222", borderRadius:9, padding:"12px 14px", cursor:"pointer", textAlign:"left", color: isDone?"#555":"#f0ece4", display:"flex", alignItems:"center", gap:12, transition:"all 0.2s", fontFamily:"Georgia,serif" }}>
              <div style={{ width:20, height:20, borderRadius:"50%", border: isDone?"none":`2px solid ${isCurrent?"#5555bb":"#2a2a2a"}`, background: isDone?goal.color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:10, color:"#0c0c0c", fontWeight:"bold" }}>
                {isDone && "✓"}
              </div>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                  <span style={{ fontSize:13, fontWeight: isGoal?"bold":"normal", textDecoration: isDone?"line-through":"none", color: isDone?"#444": isGoal?goal.color:"#f0ece4" }}>{ex.name}</span>
                  {isCurrent && <span style={{ fontSize:9, background:"#5555bb", color:"white", borderRadius:4, padding:"1px 5px", letterSpacing:0.5 }}>CURRENT</span>}
                </div>
                <div style={{ fontSize:11, color:"#444", fontFamily:"monospace" }}>{ex.reps}</div>
              </div>
              <div style={{ fontSize:9, color:"#2a2a2a", fontFamily:"monospace" }}>{String(idx+1).padStart(2,"0")}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [completed,      setCompleted]      = useState({});
  const [activeGoal,     setActiveGoal]     = useState(null);
  const [activeLift,     setActiveLift]     = useState(null);
  const [activePage,     setActivePage]     = useState("cali");
  const [muscleView,     setMuscleView]     = useState("front");
  const [saveStatus,     setSaveStatus]     = useState("idle");

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setCompleted(JSON.parse(raw));
    } catch(e) {}
  }, []);

  useEffect(() => {
    if (!Object.keys(completed).length) return;
    setSaveStatus("saving");
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(completed));
      setSaveStatus("saved");
      const t = setTimeout(() => setSaveStatus("idle"), 1500);
      return () => clearTimeout(t);
    } catch(e) { setSaveStatus("error"); }
  }, [completed]);

  const toggle = (goalId, exId) => {
    const key = `${goalId}-${exId}`;
    setCompleted(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const getProgress = (goal) => {
    const done = goal.exercises.filter(e => completed[`${goal.id}-${e.id}`]).length;
    return { done, total: goal.exercises.length, pct: Math.round((done/goal.exercises.length)*100) };
  };

  const activeGoalData = caliGoals.find(g => g.id === activeGoal);
  const activeLiftData = liftGoals.find(g => g.id === activeLift);

  const frontMuscles = [
    { id:"shoulders", label:"Shoulders" }, { id:"chest", label:"Chest" },
    { id:"biceps",    label:"Biceps"    }, { id:"abs",   label:"Abs"   },
    { id:"obliques",  label:"Obliques"  }, { id:"quads", label:"Quads" },
    { id:"calves",    label:"Calves"    },
  ];
  const backMuscles = [
    { id:"traps",      label:"Traps"      }, { id:"shoulders", label:"Rear Delts" },
    { id:"lats",       label:"Lats"       }, { id:"triceps",   label:"Triceps"    },
    { id:"glutes",     label:"Glutes"     }, { id:"hamstrings",label:"Hamstrings" },
    { id:"calves",     label:"Calves"     },
  ];
  const allMuscles = [
    { id:"chest", label:"Chest" }, { id:"shoulders", label:"Shoulders" },
    { id:"biceps", label:"Biceps" }, { id:"triceps", label:"Triceps" },
    { id:"lats", label:"Lats & Back" }, { id:"traps", label:"Trapezius" },
    { id:"abs", label:"Abs" }, { id:"obliques", label:"Obliques" },
    { id:"glutes", label:"Glutes" }, { id:"quads", label:"Quads" },
    { id:"hamstrings", label:"Hamstrings" }, { id:"calves", label:"Calves" },
  ];

  const tabs = [
    { id:"cali",   label:"🤸 Skills"  },
    { id:"lift",   label:"🏋️ Weights" },
    { id:"muscle", label:"🫀 Muscles" },
  ];

  const sf = { fontFamily:"Georgia,serif" };

  return (
    <div style={{ minHeight:"100vh", background:"#111318", color:"#f0ece4", ...sf }}>

      {/* Header */}
      <div style={{ padding:"22px 20px 10px", borderBottom:"1px solid #1e2028", position:"sticky", top:0, background:"#111318", zIndex:20, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
        <div>
          <div style={{ fontSize:10, letterSpacing:4, color:"#444", textTransform:"uppercase", marginBottom:2 }}>Your Journey</div>
          <h1 style={{ margin:0, fontSize:19, fontWeight:"normal" }}>Fitness Tracker</h1>
        </div>
        {saveStatus !== "idle" && (
          <span style={{ fontSize:10, color: saveStatus==="error"?"#ff6b6b":"#4ECDC4", letterSpacing:1 }}>
            {saveStatus==="saved"?"✓ Saved": saveStatus==="saving"?"Saving...":"⚠ Error"}
          </span>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:"1px solid #1e2028", position:"sticky", top:60, background:"#111318", zIndex:19 }}>
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => { setActivePage(tab.id); setActiveGoal(null); setActiveLift(null); }}
            style={{ flex:1, padding:"10px 4px", background:"none", border:"none", borderBottom: activePage===tab.id?"2px solid #FF6B6B":"2px solid transparent", color: activePage===tab.id?"#f0ece4":"#444", cursor:"pointer", fontSize:11, transition:"all 0.2s", ...sf }}>
            {tab.label}
          </button>
        ))}
      </div>

      {/* ── CALISTHENICS LIST ── */}
      {activePage==="cali" && !activeGoal && (
        <div style={{ padding:"18px" }}>
          <p style={{ color:"#555", fontSize:12, marginBottom:20, lineHeight:1.8 }}>
            Train your <strong style={{ color:"#aaa" }}>current exercise only</strong> each session. Check it off when comfortable, then level up. ✨
          </p>
          <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
            {caliGoals.map(goal => {
              const { done, total, pct } = getProgress(goal);
              const currentEx = goal.exercises.find(e => !completed[`${goal.id}-${e.id}`]);
              return (
                <button key={goal.id} onClick={() => setActiveGoal(goal.id)}
                  style={{ background:"#16181f", border:"1px solid #1e2028", borderLeft:`4px solid ${goal.color}`, borderRadius:12, padding:"14px 15px", cursor:"pointer", textAlign:"left", color:"#f0ece4", ...sf }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                    <div style={{ fontSize:15 }}><span style={{ marginRight:7 }}>{goal.emoji}</span>{goal.name}</div>
                    <span style={{ fontSize:11, color:goal.color, fontFamily:"monospace" }}>{done}/{total}</span>
                  </div>
                  {currentEx
                    ? <div style={{ fontSize:11, color:"#6666cc", marginBottom:8 }}>Now: {currentEx.name} — {currentEx.reps}</div>
                    : <div style={{ fontSize:11, color:"#4ECDC4", marginBottom:8 }}>🎉 Complete!</div>}
                  <div style={{ background:"#1e2028", borderRadius:3, height:3 }}>
                    <div style={{ height:"100%", width:`${pct}%`, background:goal.color, borderRadius:3 }}/>
                  </div>
                  <div style={{ fontSize:10, color:"#333", marginTop:4 }}>{pct}% complete</div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {activePage==="cali" && activeGoal && activeGoalData && (
        <ExerciseList goal={activeGoalData} completed={completed} onToggle={toggle} onBack={() => setActiveGoal(null)} />
      )}

      {/* ── WEIGHTLIFTING LIST ── */}
      {activePage==="lift" && !activeLift && (
        <div style={{ padding:"18px" }}>
          <p style={{ color:"#555", fontSize:12, marginBottom:16, lineHeight:1.8 }}>
            Same as calisthenics — check off your current weight when it feels easy, then move up. 💪
          </p>
          {liftGroupMeta.map(group => {
            const groupGoals = liftGoals.filter(g => group.ids.includes(g.id));
            const totalEx    = groupGoals.reduce((a, g) => a + g.exercises.length, 0);
            const doneEx     = groupGoals.reduce((a, g) => a + g.exercises.filter(e => completed[`${g.id}-${e.id}`]).length, 0);

            return (
              <div key={group.id} style={{ marginBottom:20 }}>
                <div style={{ fontSize:10, letterSpacing:3, color:group.color, textTransform:"uppercase", marginBottom:10, display:"flex", justifyContent:"space-between" }}>
                  <span>{group.emoji} {group.label}</span>
                  <span style={{ fontFamily:"monospace", color:"#444" }}>{doneEx}/{totalEx}</span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {groupGoals.map(goal => {
                    const { done, total, pct } = getProgress(goal);
                    const currentEx = goal.exercises.find(e => !completed[`${goal.id}-${e.id}`]);
                    return (
                      <button key={goal.id} onClick={() => setActiveLift(goal.id)}
                        style={{ background:"#16181f", border:"1px solid #1e2028", borderLeft:`4px solid ${goal.color}`, borderRadius:10, padding:"13px 15px", cursor:"pointer", textAlign:"left", color:"#f0ece4", ...sf }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                          <div style={{ fontSize:14 }}><span style={{ marginRight:6 }}>{goal.emoji}</span>{goal.name}</div>
                          <span style={{ fontSize:10, color:goal.color, fontFamily:"monospace" }}>{done}/{total}</span>
                        </div>
                        {currentEx
                          ? <div style={{ fontSize:11, color:"#6666cc", marginBottom:7 }}>Now: {currentEx.name} — {currentEx.reps}</div>
                          : <div style={{ fontSize:11, color:"#4ECDC4", marginBottom:7 }}>🎉 Max reached!</div>}
                        <div style={{ background:"#1e2028", borderRadius:3, height:3 }}>
                          <div style={{ height:"100%", width:`${pct}%`, background:goal.color, borderRadius:3 }}/>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {activePage==="lift" && activeLift && activeLiftData && (
        <ExerciseList
          goal={activeLiftData}
          completed={completed}
          onToggle={toggle}
          onBack={() => setActiveLift(null)}
        />
      )}

      {/* ── MUSCLE MAP ── */}
      {activePage==="muscle" && (
        <div style={{ padding:"18px" }}>
          <p style={{ color:"#555", fontSize:12, marginBottom:16, lineHeight:1.8 }}>Both calisthenics and lifting progress feed into your muscle map. 💪</p>
          <div style={{ display:"flex", gap:0, marginBottom:20, background:"#16181f", borderRadius:10, overflow:"hidden", border:"1px solid #1e2028" }}>
            {["front","back"].map(v => (
              <button key={v} onClick={() => setMuscleView(v)}
                style={{ flex:1, padding:"9px", background: muscleView===v?"#252836":"transparent", border:"none", color: muscleView===v?"#f0ece4":"#444", cursor:"pointer", fontSize:12, textTransform:"capitalize", ...sf }}>
                {v} View
              </button>
            ))}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:22 }}>
            <div style={{ width:130, flexShrink:0 }}>
              {muscleView==="front" ? <FrontFigure completed={completed}/> : <BackFigure completed={completed}/>}
            </div>
            <div style={{ flex:1, display:"flex", flexDirection:"column", gap:8 }}>
              {(muscleView==="front"?frontMuscles:backMuscles).map(m => {
                const level = getMuscleLevel(m.id, completed);
                return (
                  <div key={m.id+m.label} style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ width:11, height:11, borderRadius:3, background:levelColors[level], flexShrink:0, border:"1px solid #2a2a30" }}/>
                    <div>
                      <div style={{ fontSize:11, color: level>0?"#ddd":"#555" }}>{m.label}</div>
                      {level>0 && <div style={{ fontSize:9, color:levelColors[level] }}>{levelNames[level]}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ background:"#16181f", borderRadius:10, padding:"11px 13px", border:"1px solid #1e2028", marginBottom:18 }}>
            <div style={{ fontSize:10, letterSpacing:3, color:"#333", textTransform:"uppercase", marginBottom:8 }}>Level Scale</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
              {levelNames.map((l,i) => (
                <div key={l} style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <div style={{ width:11, height:11, borderRadius:3, background:levelColors[i], border:"1px solid #2a2a30" }}/>
                  <span style={{ fontSize:10, color:"#555" }}>{l}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ fontSize:10, letterSpacing:3, color:"#333", textTransform:"uppercase", marginBottom:10 }}>All Muscles</div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {allMuscles.map(m => {
              const level = getMuscleLevel(m.id, completed);
              const pct   = Math.round((level/(levelNames.length-1))*100);
              return (
                <div key={m.id} style={{ background:"#16181f", borderRadius:8, padding:"10px 13px", border:"1px solid #1e2028" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
                    <span style={{ fontSize:12 }}>{m.label}</span>
                    <span style={{ fontSize:10, color: level>0?levelColors[level]:"#333", textTransform:"capitalize", letterSpacing:1 }}>{levelNames[level]}</span>
                  </div>
                  <div style={{ background:"#1e2028", borderRadius:3, height:3 }}>
                    <div style={{ height:"100%", width:`${pct}%`, background:levelColors[level], borderRadius:3, transition:"width 0.5s" }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
